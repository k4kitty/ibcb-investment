<style>
:root { --gold:#d4a843; --blue:#2c3e50; --green:#2d8a4e; --red:#c0392b; --r:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Inter,system-ui,-apple-system,sans-serif; color:#1a1a1a; }
header { border-bottom:1px solid #eee; padding:12px 0; background:#fff; }
header .hc { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { font-size:0.85rem; font-weight:800; letter-spacing:1px; }
.logo-text { font-size:0.8rem; color:#888; }
.back-link { color:var(--blue); text-decoration:none; font-size:0.9rem; font-weight:600; cursor:pointer; }
.back-link:hover { text-decoration:underline; }
.mtl-back { display:inline-block; margin-bottom:12px; color:var(--blue); text-decoration:none; font-weight:600; font-size:0.9rem; }
.mtl-back:hover { text-decoration:underline; }
main { max-width:900px; margin:0 auto; padding:24px 20px 60px; }
.hero { text-align:center; padding:40px 0 20px; }
.hero h1 { font-size:2rem; margin-bottom:6px; }
.hero p { color:#666; font-size:1rem; max-width:520px; margin:0 auto; }
.level-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; margin:24px 0; }
.level-card { background:#fff; border:2px solid #eee; border-radius:var(--r); padding:20px; cursor:pointer; transition:all .2s; }
.level-card:hover { border-color:var(--gold); box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.level-card .num { font-size:2rem; font-weight:800; color:var(--blue); line-height:1; }
.level-card .name { font-weight:600; margin:4px 0; }
.level-card .desc { font-size:0.82rem; color:#888; }
.lesson-list { margin:20px 0; }
.lesson-card { background:#fff; border:1px solid #eee; border-radius:var(--r); padding:20px 24px; margin-bottom:12px; cursor:pointer; transition:all .2s; }
.lesson-card:hover { border-color:var(--blue); }
.lesson-card .ln { font-size:0.75rem; color:var(--blue); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.lesson-card .lt { font-weight:600; margin:2px 0; }
.lesson-card .ld { font-size:0.85rem; color:#666; margin:4px 0; }
.lesson-card .tags { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
.lesson-card .tag { background:#f0f0f0; padding:2px 10px; border-radius:20px; font-size:0.78rem; }
.practice-box { background:#fff; border:1px solid #eee; border-radius:var(--r); padding:32px; max-width:640px; margin:20px auto; text-align:center; }
.practice-box h3 { font-size:1.2rem; margin-bottom:4px; }
.practice-box .rule { color:var(--blue); font-weight:600; margin-bottom:16px; font-size:0.95rem; }
.word-display { font-size:2.5rem; font-weight:700; margin:20px 0; color:var(--blue); }
.choices { display:flex; flex-direction:column; gap:10px; max-width:450px; margin:16px auto; }
.choice-btn { padding:14px 18px; border:2px solid #ddd; border-radius:10px; background:#fff; font-size:0.95rem; cursor:pointer; transition:all .2s; text-align:left; }
.choice-btn:hover:not(:disabled) { border-color:var(--blue); background:#f8faff; }
.choice-btn.correct { border-color:var(--green); background:#e8f5e0; color:var(--green); font-weight:600; }
.choice-btn.wrong { border-color:var(--red); background:#fdecea; color:var(--red); }
.choice-btn:disabled { cursor:default; opacity:0.85; }
.btn { padding:12px 32px; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-primary { background:var(--blue); color:#fff; }
.btn-primary:hover { background:#1a252f; }
.btn-gold { background:var(--gold); color:#fff; }
.btn-gold:hover { background:#b8942e; }
.feedback { padding:12px; margin:12px 0; border-radius:8px; font-weight:600; display:none; }
.feedback.show { display:block; }
.feedback.correct { background:#e8f5e0; color:var(--green); }
.feedback.wrong { background:#fdecea; color:var(--red); }
.progress-bar { height:6px; background:#eee; border-radius:3px; margin:16px 0; overflow:hidden; }
.progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width .3s; }
.score { font-size:0.85rem; color:#888; margin-bottom:8px; }
.complete-box { text-align:center; padding:40px; }
.complete-box .big { font-size:3rem; }
.complete-box h2 { margin:12px 0; }
.teach-box { background:#f9fafb; border:1px solid #eee; border-radius:var(--r); padding:24px; margin-bottom:20px; text-align:left; max-width:600px; margin-left:auto; margin-right:auto; }
.teach-box h4 { color:var(--blue); margin-bottom:8px; }
.passage { background:#f9fafb; border-left:4px solid var(--blue); padding:16px 20px; margin:12px auto 20px; text-align:left; font-size:0.9rem; line-height:1.6; max-width:500px; border-radius:0 8px 8px 0; }
@media (max-width:600px) { .level-grid { grid-template-columns:1fr; } .practice-box { padding:20px; } .word-display { font-size:1.8rem; } }
</style>
</head>

{id:2,title:'Contrast Clues',explain:'Contrast words (but, however, although) show opposite meanings.',words:[

{w:'Voracious',d:'Wanting great amounts'},{w:'Inevitable',d:'Certain to happen; unavoidable'},
{w:'Aberration',d:'A departure from normal'},{w:'Enigma',d:'A mystery; hard to understand'},
{w:'Laudable',d:'Deserving praise'},{w:'Judicious',d:'Showing good judgment; wise'}
]}
]}
];

// ========== APP ==========
let curLvl=null,curLes=null,st={words:[],index:0,score:0,total:0,mode:'learn',answered:false};

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function renderLevels(){
    document.getElementById('levelGrid').innerHTML=C.map(l=>
        `<div class="level-card" onclick="openLevel(${l.id})">
            <div class="num">${l.emoji} ${l.id}</div>
            <div class="name">${l.name}</div>
            <div class="desc">${l.desc}</div>
        </div>`).join('');
}

function sv(id){['view-levels','view-lessons','view-practice'].forEach(v=>document.getElementById(v).style.display=v===id?'':'none');}
function showLevels(){sv('view-levels');}
function showLessons(){if(curLvl)openLevel(curLvl.id);}

function openLevel(id){
    curLvl=C.find(l=>l.id===id);
    sv('view-lessons');
    document.getElementById('lessonContent').innerHTML=
        `<h2>${curLvl.emoji} ${curLvl.name}</h2>
        <p style="color:#666;margin-bottom:20px;">${curLvl.desc} — ${curLvl.lessons.length} lessons</p>
        <div class="lesson-list">${curLvl.lessons.map((ls,i)=>`
            <div class="lesson-card" onclick="openLesson(${i})">
                <div class="ln">Lesson ${i+1}</div>
                <div class="lt">${ls.title}</div>
                <div class="ld">${ls.explain}</div>
                <div class="tags">${ls.words.slice(0,5).map(w=>`<span class="tag">${w.w}</span>`).join('')}${ls.words.length>5?`<span class="tag">+${ls.words.length-5}</span>`:''}</div>
            </div>`).join('')}</div>`;
}

function openLesson(idx){
    curLes=curLvl.lessons[idx];
    sv('view-practice');
    startPractice();
}

function startPractice(){
    st={words:shuffle([...curLes.words]),index:0,score:0,total:curLes.words.length,mode:'learn',answered:false};
    renderPractice();
}

function renderPractice(){
    const w=st.words[st.index];
    if(!w){renderComplete();return;}
    const pct=Math.round((st.index/st.total)*100);
    let h=`<div class="practice-box">
        <h3>${curLes.title}</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="score">Word ${st.index+1} of ${st.total} · Score: ${st.score}/${st.index||1}</div>`;

    if(st.mode==='learn'){
        h+=`<div class="teach-box"><h4>📖 Learn This Word</h4>
            <div style="font-size:2.2rem;font-weight:700;margin:8px 0;color:var(--blue);">${w.w}</div>
            <div style="font-size:1rem;color:#555;line-height:1.5;">${w.d}</div>
            ${w.c?`<div class="passage" style="margin-top:12px;">📝 <em>"${w.c}"</em></div>`:''}
        </div>
        <button class="btn btn-primary" onclick="st.mode='quiz';st.answered=false;renderPractice();">I'm Ready — Test Me!</button>`;
    }else{
        const all=C.flatMap(l=>l.lessons).flatMap(l=>l.words);
        let wrong=all.filter(x=>x.w!==w.w).map(x=>x.d);
        wrong=shuffle(wrong).slice(0,3);
        const ch=shuffle([{d:w.d,correct:true},...wrong.map(d=>({d,correct:false}))]);
        h+=`<div class="word-display">${w.w}</div>`;
        if(w.c)h+=`<div class="passage">📝 <em>"${w.c}"</em></div>`;
        h+=`<div style="color:#666;margin-bottom:8px;">What does <strong>${w.w}</strong> mean?</div><div class="choices" id="choiceList">`;
        ch.forEach((c,i)=>h+=`<button class="choice-btn" id="c${i}" onclick="checkChoice(${i},${c.correct},'${c.d.replace(/'/g,"\\'")}')">${c.d}</button>`);
        h+=`</div><div class="feedback" id="fb"></div><button class="btn btn-primary" id="nextBtn" onclick="nextWord()" style="display:none;">Next →</button>`;
    }
    h+='</div>';
    document.getElementById('practiceContent').innerHTML=h;
}

function checkChoice(idx,correct,def){
    if(st.answered)return; st.answered=true;
    const w=st.words[st.index],fb=document.getElementById('fb');
    document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===w.d)b.classList.add('correct');});
    if(correct){st.score++;document.getElementById('c'+idx).classList.add('correct');fb.textContent='✅ Correct! Great job!';fb.className='feedback show correct';}
    else {document.getElementById('c'+idx).classList.add('wrong');fb.textContent=`❌ Not quite. "${w.w}" means: ${w.d}`;fb.className='feedback show wrong';}
    document.getElementById('nextBtn').style.display='';
}

function nextWord(){
    st.index++; st.mode='learn'; st.answered=false;
    st.index<st.total?renderPractice():renderComplete();
}

function renderComplete(){
    const pct=Math.round((st.score/st.total)*100);
    // Save to server
    (function(){var p=new URLSearchParams(window.location.search);var s=p.get('sid');if(s&&curLvl&&curLes){var sts=pct>=90?3:pct>=70?2:pct>=50?1:0;fetch('/api/mtl/skill/progress',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id:s,skill:'vocabulary',level_id:curLvl.id,lesson_id:curLvl.lessons.indexOf(curLes),completed:true,score:pct,stars:sts})}).catch(function(){})}})();
    let stars=pct>=90?'🌟🌟🌟':pct>=70?'🌟🌟':pct>=50?'🌟':'📚';
    document.getElementById('practiceContent').innerHTML=`<div class="practice-box complete-box">
        <div class="big">${pct>=80?'🏆':'📖'}</div>
        <h2>Lesson Complete!</h2>
        <div style="font-size:2rem;margin:8px 0;">${stars}</div>
        <p style="color:#666;">${st.score} of ${st.total} correct (${pct}%)</p>
        ${pct>=90?'<p style="color:var(--green);font-weight:600;">🎉 Excellent! You\'ve mastered this!</p>':''}
        ${pct>=70&&pct<90?'<p style="color:var(--blue);font-weight:600;">👍 Good work! Keep practicing.</p>':''}
        ${pct<70?'<p style="color:#888;">Keep practicing to improve your score.</p>':''}
        <div style="margin-top:24px;">
            <button class="btn btn-primary" onclick="openLesson(${curLvl.lessons.indexOf(curLes)})" style="margin-right:8px;">Practice Again</button>
            <button class="btn btn-gold" onclick="showLessons()">More Lessons</button>
        </div>
    </div>`;
}

// Init
renderLevels();
(function(){
    const p=new URLSearchParams(location.search),lv=parseInt(p.get('level')),ls=parseInt(p.get('lesson'));
    if(lv&&C[lv-1]){curLvl=C[lv-1];ls!=null&&curLvl.lessons[ls]?openLesson(ls):openLevel(lv);}
})();
// TTS
(function(){function spk(el){if(!window.speechSynthesis)return;var t=el.textContent||el.innerText;if(!t||t.length<3)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;window.speechSynthesis.speak(u);}function addSB(el){if(el.querySelector('.spk-btn'))return;var b=document.createElement('button');b.className='spk-btn';b.textContent='🔊';b.title='Read aloud';b.onclick=function(e){e.stopPropagation();spk(el);};el.style.position='relative';el.insertBefore(b,el.firstChild);}setTimeout(function(){document.querySelectorAll('.rule,.word-display,.pbox h3,.ex').forEach(addSB);},600);var o=new MutationObserver(function(){document.querySelectorAll('.rule:not(:has(.spk-btn)),.word-display:not(:has(.spk-btn)),.pbox h3:not(:has(.spk-btn)),.ex:not(:has(.spk-btn))').forEach(addSB);});o.observe(document.body,{childList:true,subtree:true});})();
</script>
<script>document.addEventListener('DOMContentLoaded',function(){var l=document.querySelector('.logo');if(!l||l.querySelector('a'))return;var a=document.createElement('a');a.href='index.html';a.style.cssText='text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;';a.innerHTML=l.innerHTML;l.innerHTML='';l.appendChild(a);});</script>
</body>
</html>
