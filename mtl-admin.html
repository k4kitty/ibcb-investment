<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTL English — Teacher Dashboard</title>
    <link rel="stylesheet" href="public/css/styles.css">
    <style>
        body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #fafafa; margin: 0; }
        .login-box { max-width: 380px; margin: 80px auto; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 40px 32px; text-align: center; }
        .login-box h2 { margin: 0 0 4px; font-size: 1.4rem; }
        .login-box .sub { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 0.95rem; box-sizing: border-box; }
        .login-box input:focus { border-color: #2c3e50; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: #2c3e50; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #1a252f; }
        .login-error { color: #c0392b; font-size: 0.85rem; margin-top: 8px; display: none; }

        .dashboard { display: none; max-width: 900px; margin: 0 auto; padding: 24px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .dash-header h1 { font-size: 1.4rem; margin: 0; }
        .dash-header .logout { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 6px 16px; font-size: 0.85rem; color: #888; cursor: pointer; }
        .dash-header .logout:hover { border-color: #c0392b; color: #c0392b; }

        table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        th { background: #fafafa; padding: 12px 14px; text-align: left; font-size: 0.8rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
        td { padding: 12px 14px; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        code { background: #f5f5f5; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }

        .view-btn { background: #2c3e50; color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; }
        .view-btn:hover { background: #1a252f; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #fff; border-radius: 12px; padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-box h3 { margin: 0 0 4px; }
        .modal-box .sub { color: #888; margin: 0 0 20px; }
        .modal-box table { border: none; }
        .modal-box td { padding: 8px 10px; }
        .progress-bar { background: #eee; height: 6px; border-radius: 3px; width: 180px; }
        .progress-bar-fill { background: #2d8a4e; height: 6px; border-radius: 3px; }
        .modal-close { margin-top: 20px; padding: 8px 24px; background: #2c3e50; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

        .empty { text-align: center; color: #888; padding: 24px; }

        @media (max-width: 600px) {
            .login-box { margin: 40px 16px; padding: 28px 20px; }
            .dashboard { padding: 16px; }
            table { font-size: 0.8rem; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <h2>MTL English</h2>
    <p class="sub">Teacher Dashboard</p>
    <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" required autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" required autocomplete="current-password">
        <button type="submit">登入</button>
    </form>
    <p class="login-error" id="loginError"></p>
</div>

<div id="dashboard" class="dashboard">
    <div class="dash-header">
        <h1>🎓 MTL English — 學生進度</h1>
        <button class="logout" id="logoutBtn">登出</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>學生</th><th>Save Code</th><th>已完成</th><th>🏆</th><th>⭐</th><th>最後活動</th><th></th>
            </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
    </table>
</div>

<script>
const API = {
    async post(url, body) {
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        return r.json();
    },
    async get(url) {
        const r = await fetch(url, { credentials: 'same-origin' });
        if (r.status === 401) throw new Error('Unauthorized');
        return r.json();
    }
};

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    try {
        const data = await API.post('/api/mtl/admin/login', {
            username: document.getElementById('loginUser').value.trim(),
            password: document.getElementById('loginPass').value
        });
        if (data.success) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStudents();
        } else {
            errEl.textContent = data.error || '登入失敗';
            errEl.style.display = 'block';
        }
    } catch (err) {
        errEl.textContent = '連線失敗';
        errEl.style.display = 'block';
    }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('loginPass').value = '';
});

async function loadStudents() {
    try {
        const data = await API.get('/api/mtl/teacher/students');
        const tbody = document.getElementById('studentsTable');
        if (!data.students || data.students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty">尚無學生記錄</td></tr>';
            return;
        }
        tbody.innerHTML = data.students.map(s => {
            const levelsDone = Math.floor((s.games_done || 0) / 20);
            const lastActive = s.last_active ? new Date(s.last_active).toLocaleString('zh-HK') : '-';
            return `<tr>
                <td><strong>${esc(s.name)}</strong></td>
                <td><code>${esc(s.save_code)}</code></td>
                <td>${s.games_done} / 240</td>
                <td>${s.trophies}</td>
                <td>${s.total_stars}</td>
                <td>${lastActive}</td>
                <td><button class="view-btn" onclick="viewStudent('${s.id}','${esc(s.name)}','${esc(s.save_code)}')">查看</button></td>
            </tr>`;
        }).join('');
    } catch (err) {
        if (err.message === 'Unauthorized') {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
        }
    }
}

async function viewStudent(id, name, code) {
    try {
        const data = await API.get('/api/mtl/teacher/progress/' + id);
        let rows = '';
        for (let i = 1; i <= 12; i++) {
            const key = 'level_' + i;
            const l = data.levels[key];
            const pct = Math.round((l.gamesDone / 20) * 100);
            const badge = l.completed ? '🏆' : (l.gamesDone > 0 ? '🟡' : '⚪');
            rows += `<tr>
                <td>${badge}</td><td>Grade ${i}</td><td>${l.gamesDone}/20</td>
                <td><div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div></td>
                <td>${pct}%</td>
            </tr>`;
        }
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal-box">
            <h3>${esc(name)}</h3>
            <p class="sub">Save Code: <strong>${esc(code)}</strong></p>
            <table><tbody>${rows}</tbody></table>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">關閉</button>
        </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    } catch (err) {
        alert('載入失敗');
    }
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
<script>document.addEventListener('DOMContentLoaded',function(){var l=document.querySelector('.logo');if(!l||l.querySelector('a'))return;var a=document.createElement('a');a.href='index.html';a.style.cssText='text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;';a.innerHTML=l.innerHTML;l.innerHTML='';l.appendChild(a);});</script>
</body>
</html>
